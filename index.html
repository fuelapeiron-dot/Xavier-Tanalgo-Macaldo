
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapText Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Merriweather:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Anton&family=Bebas+Neue&family=Lobster&family=Oswald:wght@500;700&family=Poppins:wght@600;800&display=swap');
      
      body {
        background-color: #0f172a; /* Slate 900 */
        color: white;
        overscroll-behavior: none;
        overflow: hidden;
      }
      
      /* Global scrollbar hide for clean background */
      body::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }

      /* Custom scrollbar for interactive components */
      .custom-scrollbar::-webkit-scrollbar {
        height: 4px;
        width: 4px;
      }
      
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      .mask-fade-right {
        mask-image: linear-gradient(to right, black 85%, transparent 100%);
      }
    </style>
